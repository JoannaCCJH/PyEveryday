[mutmut]
# Default runner: pytest, fail-fast, no coverage (overrides pytest.ini --cov),
# and disable pytest's persistent cache so mutmut runs are reproducible.
# Per-category paths/tests are passed by backend/tests/mutation/run.sh.
runner = python -m pytest -x -q --no-cov -p no:cacheprovider --no-header
backup = False
dict_synonyms = Struct, NamedStruct
