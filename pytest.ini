[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --cov=backend/scripts/utilities
    --cov=backend/scripts/MachineLearning
    --cov=backend/scripts/automation
    --cov=backend/scripts/web_scraping
    --cov-branch
    --cov-report=term-missing
    --cov-report=html:backend/tests/reports/coverage_html
markers =
    blackbox: equivalence partitioning, boundary, error-guessing tests
    whitebox: branch-coverage driven tests
    integration: FastAPI + backend integration tests
    api: REST API tests
    slow: tests that hit the network or are otherwise slow
